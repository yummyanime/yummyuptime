version: "3.8"

services:
    app:
        build: .
        ports:
            - "3000:3000" # Expose port 3000 for the Express server
            - "80:80" # Keep port 80 if needed for other reasons (e.g., reverse proxy) - if the client directly accesses the container's port 80, this should serve the client's static files.
        depends_on:
            - db
        environment:
            - DATABASE_URL=${DATABASE_URL}
            - GLOBALPING_API_KEY=${GLOBALPING_API_KEY}
            - GLOBALPING_API_KEY2=${GLOBALPING_API_KEY2}
            - GLOBALPING_API_KEY3=${GLOBALPING_API_KEY3}
            - GLOBALPING_API_KEY4=${GLOBALPING_API_KEY4}
            - GLOBALPING_SECRET_KEY=${GLOBALPING_SECRET_KEY}
        restart: always

    db:
        image: postgres:13
        ports:
            - "5432:5432"
        environment:
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
        volumes:
            - pgdata:/var/lib/postgresql/data
        restart: always

volumes:
    pgdata:
